{% extends 'base.html' %}

{% block title %}Login - AI Career & Placement Assistant{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-panel text-center">
        <!-- Icon / Graphic -->
        <div class="mb-4">
            <span class="d-inline-flex align-items-center justify-content-center bg-dark border border-secondary rounded-circle" style="width: 70px; height: 70px;">
                <i class="fa-solid fa-user-lock text-gradient fs-3"></i>
            </span>
        </div>
        
        <h2 class="mb-1">Welcome Back</h2>
        <p class="text-secondary-custom mb-4">Log in to analyze resumes and check placement stats</p>
        
        <!-- Registration Form -->
        <form action="{{ url_for('login') }}" method="POST">
            <!-- Username Input -->
            <div class="mb-3 text-start">
                <label for="username" class="form-label">Username or Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle" style="border-radius: 12px 0 0 12px; color: var(--text-muted);">
                        <i class="fa-solid fa-circle-user"></i>
                    </span>
                    <input type="text" 
                           class="form-control glass-input border-start-0 ps-0" 
                           id="username" 
                           name="username" 
                           placeholder="Enter your username or email" 
                           required 
                           autocomplete="username"
                           style="border-radius: 0 12px 12px 0;">
                </div>
            </div>
            
            <!-- Password Input -->
            <div class="mb-4 text-start">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle" style="border-radius: 12px 0 0 12px; color: var(--text-muted);">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" 
                           class="form-control glass-input border-start-0 ps-0" 
                           id="password" 
                           name="password" 
                           placeholder="Enter your password" 
                           required 
                           autocomplete="current-password"
                           style="border-radius: 0 12px 12px 0;">
                </div>
            </div>
            
            <!-- Submit Action -->
            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-premium" id="btn-login-submit">
                    Sign In <i class="fa-solid fa-right-to-bracket ms-2"></i>
                </button>
            </div>
        </form>
        
        <div class="mt-4 pt-3 border-top border-secondary-subtle">
            <p class="mb-0 text-secondary-custom fs-7">
                Don't have an account? 
                <a href="{{ url_for('signup') }}" class="text-gradient-cyan fw-bold text-decoration-none">Create Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
